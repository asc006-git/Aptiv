  - "Claude"

ai_usage_summary: |
  Used Claude for code review, architectural discussion, and implementation
  of submission compliance fixes and honeypot detection. No candidate data
  was fed to any LLM.

methodology_summary: |
  Multi-signal rule-based ranker with 5 weighted scoring components:
  skill match (0.40), production experience (0.25), retrieval/ranking
  experience (0.15), behavioral signals (0.10), startup fit (0.10).
  Risk penalty subtracts for chronology/salary/trust errors and
  honeypot inconsistencies. Hidden Gem detection identifies candidates
  undervalued by keyword ranking. RAP prioritizes recruiter outreach.
  Narrative generation synthesizes archetype, strengths, risks, and
  actionable recruiter guidance. Honeypot protection via timeline
  consistency, skill-duration mismatch, and title-keyword alignment
  checks integrated into the risk penalty.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
