ai_usage_summary: |
  Used Claude for code review, architectural discussion, and implementation
  of submission compliance fixes and honeypot detection. No candidate data
  was fed to any LLM.

methodology_summary: |
  Rule-based ranker with 5 weighted scoring components (skill match 0.40,
  production experience 0.25, retrieval/ranking 0.15, behavioral 0.10,
  startup fit 0.10). Risk penalty subtracts for chronology/salary/trust
  errors and honeypot inconsistencies. 60-feature streaming parser extracts
  skills, disqualifiers, behavioral signals, and data quality flags from
  100K JSONL profiles. Hidden Gem detection (6-component score, 5 categories)
  identifies candidates undervalued by keyword ranking. RAP engine (4-component
  score) prioritizes recruiter outreach by engagement velocity, availability,
  conversion likelihood, and match baseline. Narrative generation uses 8
  structurally distinct templates with hash-varied phrasing — each narrative
  includes score breakdown, pool-relative explainability, JD alignment, and at
  least one genuine concern. Every narrative is deterministic, auditable,
  and derived purely from candidate data with zero LLM calls.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
